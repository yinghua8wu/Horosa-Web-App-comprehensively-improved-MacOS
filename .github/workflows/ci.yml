name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend Test And Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Horosa-Web/astrostudyui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Horosa-Web/astrostudyui/package-lock.json
      - name: Install
        run: npm ci
      - name: Test
        run: npm test -- --runInBand
      - name: Build file distribution
        run: npm run build:file

  backend:
    name: Backend Maven Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Test boundless
        run: mvn test -DskipTests=false
        working-directory: Horosa-Web/astrostudysrv/boundless
      - name: Install boundless
        run: mvn -DskipTests install
        working-directory: Horosa-Web/astrostudysrv/boundless
      - name: Install basecomm
        run: mvn -DskipTests install
        working-directory: Horosa-Web/astrostudysrv/basecomm
      - name: Install image
        run: mvn -DskipTests install
        working-directory: Horosa-Web/astrostudysrv/image
      - name: Test astrostudy
        run: mvn test -DskipTests=false
        working-directory: Horosa-Web/astrostudysrv/astrostudy

  desktop-shell:
    name: Desktop Shell Check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cargo fmt
        run: cargo fmt --manifest-path Horosa_Desktop_Installer/src-tauri/Cargo.toml --check
      - name: Cargo check
        run: cargo check --manifest-path Horosa_Desktop_Installer/src-tauri/Cargo.toml
      - name: Runtime update helper tests
        run: cargo test --manifest-path Horosa_Desktop_Installer/src-tauri/Cargo.toml runtime_update_command_
