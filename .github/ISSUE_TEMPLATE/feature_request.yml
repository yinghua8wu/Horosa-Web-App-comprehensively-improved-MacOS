name: Feature Request
description: Propose an improvement to the product, workflow, or developer loop.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow improvement clearly and honestly.
        
        请尽量用真实使用场景来描述需求，而不是只给出功能名。
  - type: dropdown
    id: loop
    attributes:
      label: Which loop does this improve? / 改善哪个循环
      options:
        - compile
        - review
        - ask
        - archive
        - audit
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Product Area / 产品区域
      options:
        - AIAnalysis
        - Astrology workspace
        - Chinese traditional modules
        - Desktop installer / runtime
        - Documentation
        - Release automation
        - Repository health
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / 痛点
      description: What is hard, slow, risky, or confusing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change / 希望的改动
    validations:
      required: true
  - type: textarea
    id: demo
    attributes:
      label: Example flow / 示例流程
      description: Show how the improved loop should feel.
  - type: textarea
    id: constraints
    attributes:
      label: Constraints / 约束
      description: Founder decisions, compatibility constraints, local-first rules, or security concerns.
