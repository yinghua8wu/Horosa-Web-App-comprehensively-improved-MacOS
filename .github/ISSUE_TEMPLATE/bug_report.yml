name: Bug Report
description: Report a reproducible problem in the web workspace, macOS app, runtime, or AI analysis flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please keep secrets redacted.
        
        感谢反馈问题。请先确认日志和截图已经脱敏。
  - type: dropdown
    id: workspace_mode
    attributes:
      label: Workspace Mode / 工作模式
      description: Where did the problem happen?
      options:
        - Web
        - macOS App
        - Both web and app
        - Installer / runtime update
    validations:
      required: true
  - type: dropdown
    id: provider_mode
    attributes:
      label: Provider Mode / Provider 模式
      description: Which AI path was active, if any?
      options:
        - Not using AIAnalysis
        - Built-in preset provider
        - OpenAI-compatible custom provider
        - Local-first only (no remote provider)
        - Mixed / not sure
    validations:
      required: true
  - type: input
    id: provider_name
    attributes:
      label: Provider / Model
      description: "Example: DeepSeek / deepseek-chat"
      placeholder: DeepSeek / deepseek-chat
  - type: textarea
    id: steps
    attributes:
      label: Reproducible Steps / 复现步骤
      description: Give the shortest path that reproduces the issue.
      placeholder: |
        1. Open AI分析 > 分析
        2. Select provider preset ...
        3. Click 发送分析
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 预期行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, export snippets / 日志、截图、导出片段
      description: Redact private charts, usernames, paths, and keys before pasting.
  - type: dropdown
    id: local_data_share
    attributes:
      label: Can local data be shared? / 本地数据是否可分享
      options:
        - Yes, sanitized data can be shared
        - Only redacted snippets can be shared
        - No, local data cannot be shared
    validations:
      required: true
